name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.41.5'

jobs:
  build-macos:
    name: macOS Build
    runs-on: macos-14  # Apple Silicon
    outputs:
      version: ${{ steps.version.outputs.version }}
      sparkle_signature: ${{ steps.sparkle_sign.outputs.signature }}
      sparkle_length: ${{ steps.sparkle_sign.outputs.length }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (freezed, riverpod, drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods
        run: cd macos && pod install --repo-update

      - name: Install Apple certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERT_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          # Create temporary keychain
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD="ci-keychain-pwd"

          echo -n "$P12_BASE64" | base64 --decode -o $CERT_PATH

          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Make this keychain the default for codesign
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Verify cert is available
          security find-identity -v -p codesigning $KEYCHAIN_PATH

          echo "✓ Apple certificate installed"

      - name: Build macOS release
        run: flutter build macos --release

      - name: Bundle native libs and sign
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP="build/macos/Build/Products/Release/gloam.app"
          DEST="$APP/Contents/MacOS"
          ENTITLEMENTS="macos/Runner/Release.entitlements"

          # Find the signing identity from the keychain
          SIGN_ID=$(security find-identity -v -p codesigning $RUNNER_TEMP/app-signing.keychain-db | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Signing with: $SIGN_ID"

          mkdir -p "$DEST"

          # Install and bundle native libs
          brew install libolm openssl@3

          FRAMEWORKS="$APP/Contents/Frameworks"
          mkdir -p "$FRAMEWORKS"

          LIBOLM="$(brew --prefix libolm)/lib/libolm.3.dylib"
          if [ -f "$LIBOLM" ]; then
            # Bundle in BOTH MacOS/ and Frameworks/ — hardened runtime
            # only allows dlopen from specific rpaths, and Frameworks/ is
            # in the default search path for hardened apps
            cp "$LIBOLM" "$DEST/libolm.3.dylib"
            cp "$LIBOLM" "$FRAMEWORKS/libolm.3.dylib"
            install_name_tool -id "@rpath/libolm.3.dylib" "$DEST/libolm.3.dylib"
            install_name_tool -id "@rpath/libolm.3.dylib" "$FRAMEWORKS/libolm.3.dylib"
            codesign --force --sign "$SIGN_ID" "$DEST/libolm.3.dylib"
            codesign --force --sign "$SIGN_ID" "$FRAMEWORKS/libolm.3.dylib"
          fi

          LIBCRYPTO="$(brew --prefix openssl@3)/lib/libcrypto.3.dylib"
          if [ -f "$LIBCRYPTO" ]; then
            cp "$LIBCRYPTO" "$DEST/libcrypto.3.dylib"
            cp "$LIBCRYPTO" "$FRAMEWORKS/libcrypto.3.dylib"
            install_name_tool -id "@rpath/libcrypto.3.dylib" "$DEST/libcrypto.3.dylib"
            install_name_tool -id "@rpath/libcrypto.3.dylib" "$FRAMEWORKS/libcrypto.3.dylib"
            codesign --force --sign "$SIGN_ID" "$DEST/libcrypto.3.dylib"
            codesign --force --sign "$SIGN_ID" "$FRAMEWORKS/libcrypto.3.dylib"
          fi

          # Sign the app with hardened runtime
          codesign --force --deep --options runtime \
            --sign "$SIGN_ID" --entitlements "$ENTITLEMENTS" "$APP"

          echo "✓ App signed"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP="build/macos/Build/Products/Release/gloam.app"

          # Create ZIP for notarization
          cd build/macos/Build/Products/Release
          zip -r -y "$RUNNER_TEMP/Gloam-notarize.zip" gloam.app
          cd ../../../../..

          # Submit for notarization
          echo "Submitting for notarization..."
          xcrun notarytool submit "$RUNNER_TEMP/Gloam-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait || echo "⚠ Notarization failed — continuing with signed-only build"

          # Staple (may fail if notarization failed, that's OK)
          xcrun stapler staple "$APP" || echo "⚠ Stapling skipped"

          echo "✓ Notarization complete"

      - name: Create ZIP
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd build/macos/Build/Products/Release
          zip -r -y "../../../../Gloam-${VERSION}-macos.zip" gloam.app

      - name: Sign update with Sparkle
        id: sparkle_sign
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP="build/Gloam-${VERSION}-macos.zip"
          SIGN_UPDATE="macos/Pods/Sparkle/bin/sign_update"

          echo "Key length: ${#SPARKLE_KEY} chars"

          # Try 1: key is already the base64 ed25519 key — pipe directly
          if SIG_OUTPUT=$(printf '%s' "$SPARKLE_KEY" | "$SIGN_UPDATE" "$ZIP" --ed-key-file - 2>&1); then
            echo "Signed with direct key"
          # Try 2: key is double-base64-encoded — decode once, then pipe
          elif SIG_OUTPUT=$(printf '%s' "$SPARKLE_KEY" | base64 --decode 2>/dev/null | "$SIGN_UPDATE" "$ZIP" --ed-key-file - 2>&1); then
            echo "Signed with base64-decoded key"
          else
            echo "::error::sign_update failed with both direct and decoded key: $SIG_OUTPUT"
            exit 1
          fi

          # Parse signature and length from output
          # sign_update outputs: sparkle:edSignature="..." length="..."
          SIGNATURE=$(echo "$SIG_OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' | sed 's/sparkle:edSignature="//;s/"$//')
          LENGTH=$(echo "$SIG_OUTPUT" | grep -o 'length="[^"]*"' | sed 's/length="//;s/"$//')

          if [ -z "$SIGNATURE" ]; then
            echo "::error::Failed to parse signature from sign_update output: $SIG_OUTPUT"
            exit 1
          fi

          echo "signature=$SIGNATURE" >> $GITHUB_OUTPUT
          echo "length=$LENGTH" >> $GITHUB_OUTPUT
          echo "✓ Sparkle signature generated"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/Gloam-*-macos.zip

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (freezed, riverpod, drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows release
        run: flutter build windows --release

      - name: Bundle libolm for Windows
        shell: bash
        run: |
          # Download prebuilt libolm for Windows from the official releases
          DEST="build/windows/x64/runner/Release"

          # Build olm from source using CMake (it's a small C library)
          git clone --depth 1 --branch 3.2.16 https://gitlab.matrix.org/matrix-org/olm.git /tmp/olm
          cd /tmp/olm
          cmake -B build -DCMAKE_BUILD_TYPE=Release -A x64
          cmake --build build --config Release
          cp build/Release/olm.dll "$GITHUB_WORKSPACE/$DEST/olm.dll" || true
          # The Dart olm package loads "libolm.dll" — CMake produces "olm.dll"
          # Copy it with both names so DynamicLibrary.open finds it
          cp build/Release/olm.dll "$GITHUB_WORKSPACE/$DEST/libolm.dll" || true
          cd "$GITHUB_WORKSPACE"

          # Also copy OpenSSL DLLs if needed (usually available on Windows)
          echo "✓ Native libs bundled for Windows"
          ls -la "$DEST"/*.dll 2>/dev/null || echo "Note: olm DLL may not have built"

      - name: Create ZIP
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "build\Gloam-${version}-windows.zip"

      - name: Create installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version scripts\windows_installer.iss
          Move-Item scripts\Output\Gloam-*-windows-setup.exe build\ -ErrorAction SilentlyContinue
          Get-ChildItem build\Gloam-*-windows*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            build/Gloam-*-windows.zip
            build/Gloam-*-windows-setup.exe

  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts/

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Gloam ${{ needs.build-macos.outputs.version }}
          body: |
            ## Gloam ${{ needs.build-macos.outputs.version }}

            ### Installation

            **macOS:**
            1. Download `Gloam-${{ needs.build-macos.outputs.version }}-macos.zip`
            2. Extract and move `gloam.app` to your Applications folder
            3. Double-click to launch

            **Windows:**
            - **Installer (recommended):** Download `Gloam-${{ needs.build-macos.outputs.version }}-windows-setup.exe` and run it
            - **Portable:** Download `Gloam-${{ needs.build-macos.outputs.version }}-windows.zip`, extract, and run `gloam.exe`

            Future updates will be delivered automatically.
          files: artifacts/*
          draft: false
          prerelease: false

      - name: Update appcast files
        run: |
          VERSION="${{ needs.build-macos.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          DATE=$(date -u '+%a, %d %b %Y %H:%M:%S +0000')
          MAC_URL="https://github.com/sabizmil/Gloam/releases/download/${TAG}/Gloam-${VERSION}-macos.zip"
          WIN_URL="https://github.com/sabizmil/Gloam/releases/download/${TAG}/Gloam-${VERSION}-windows-setup.exe"
          SPARKLE_SIG="${{ needs.build-macos.outputs.sparkle_signature }}"
          SPARKLE_LEN="${{ needs.build-macos.outputs.sparkle_length }}"

          # Extract build number from pubspec.yaml (the +N part)
          # Sparkle compares sparkle:version against CFBundleVersion (build number)
          BUILD_NUM=$(grep 'version:' pubspec.yaml | head -1 | sed 's/.*+//')
          echo "Version: $VERSION, Build: $BUILD_NUM, Signature: ${SPARKLE_SIG:0:20}..., Length: $SPARKLE_LEN"

          if [ -z "$SPARKLE_SIG" ]; then
            echo "::error::Sparkle signature is missing — appcast would be invalid"
            exit 1
          fi

          cat > appcast.xml << APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Gloam Updates</title>
              <link>https://github.com/sabizmil/Gloam/releases</link>
              <description>Most recent updates for Gloam</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${BUILD_NUM}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>12.0</sparkle:minimumSystemVersion>
                <pubDate>${DATE}</pubDate>
                <enclosure
                  url="${MAC_URL}"
                  sparkle:edSignature="${SPARKLE_SIG}"
                  length="${SPARKLE_LEN}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          APPCAST_EOF

          cat > appcast_windows.xml << APPCAST_WIN_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Gloam Updates (Windows)</title>
              <link>https://github.com/sabizmil/Gloam/releases</link>
              <description>Most recent updates for Gloam on Windows</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${BUILD_NUM}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <pubDate>${DATE}</pubDate>
                <enclosure
                  url="${WIN_URL}"
                  length="0"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          APPCAST_WIN_EOF

      - name: Commit updated appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Checkout main branch (tag checkout leaves us in detached HEAD)
          git fetch origin main
          git checkout main
          git add appcast.xml appcast_windows.xml
          git diff --cached --quiet || git commit -m "Update appcast for ${{ github.ref_name }}"
          git push origin main || echo "Push failed — appcast update skipped"
