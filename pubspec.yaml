name: gloam
description: A Matrix chat client built for the twilight.
publish_to: 'none'
version: 0.5.3+22

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # Matrix SDK
  matrix: ^0.40.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local database
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.32
  sqflite_common_ffi: ^2.3.4+4

  # Networking
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Image caching
  cached_network_image: ^3.4.1

  # Data classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Voice / WebRTC
  livekit_client: ^2.3.6
  flutter_webrtc: ^0.12.8
  permission_handler: ^11.4.0

  # Utilities
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  collection: ^1.19.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  flutter_olm: ^2.0.0
  cryptography: ^2.9.0
  file_picker: ^10.3.10
  desktop_drop: ^0.7.0
  pasteboard: ^0.5.0
  mime: ^2.0.0
  shared_preferences: ^2.3.0
  audioplayers: ^6.1.0
  auto_updater: ^1.0.0
  package_info_plus: ^8.3.0

  # Video playback
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_macos_video: ^1.1.4
  media_kit_libs_windows_video: ^1.0.10
  media_kit_libs_ios_video: ^1.1.4
  media_kit_libs_linux: ^1.1.3
  webview_flutter: ^4.13.1
  windows_taskbar: ^1.1.2
  flutter_markdown: ^0.7.7+1
  flutter_highlight: ^0.7.0
  flutter_widget_from_html_core: ^0.15.2
  html: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  drift_dev: ^2.25.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/badges/
